# Đổi `app` thành tên app duy nhất của bạn trên Fly (vd: hethongnopbaithi-abc)
app = "hethongnopbaithi"
primary_region = "sin"   # Singapore — gần Việt Nam nhất; có thể đổi: hkg, nrt, …

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
